services:
  postgres:
    image: postgres:16
    container_name: matchme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: matchme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - matchme-postgres-data:/var/lib/postgresql/data

volumes:
  matchme-postgres-data:
